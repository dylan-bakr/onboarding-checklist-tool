name: Build & Export Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  lint-and-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check & Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    name: Build & Export Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: onboarding-checklist-tool:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package for Milliman Access Portal
        run: |
          mkdir -p workbench
          docker save onboarding-checklist-tool:${{ github.ref_name }} | tar -x -C workbench
          cd workbench
          tar cvfz ../onboarding-checklist-tool-${{ github.ref_name }}.tar.gz *

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: onboarding-checklist-tool-${{ github.ref_name }}.tar.gz
          generateReleaseNotes: true
